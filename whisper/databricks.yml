# This is a Databricks asset bundle definition for whisper.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: whisper
  uuid: 680c657c-9750-4639-a9ee-408248025d02

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

resources:
  apps:
    whisper_app:
      name: 'whisper-transcription'
      description: 'Meeting transcription and speaker diarization using Whisper and pyannote'
      source_code_path: ./app
      resources:
        - name: 'huggingface-token'
          secret:
            key: 'huggingface-token'
            scope: 'whisper-app'
            permission: 'READ'

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405618499553895.15.azuredatabricks.net
    variables:
      catalog: catalog_whisper
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405618499553895.15.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/erico.silva@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/erico.silva@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: catalog_whisper
      schema: prod
    permissions:
      - user_name: erico.silva@databricks.com
        level: CAN_MANAGE
